name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build sphinx docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # autodoc imports the bosl2 modules, which import the pythonscad C extension;
      # it dlopens these system libraries at import time.
      - name: Install system libraries for the pythonscad wheel
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglu1-mesa libegl1 libglib2.0-0 \
            libfontconfig1 libfreetype6 libharfbuzz0b \
            libxkbcommon0 libx11-6 libxext6 libxrender1

      - name: Install package with docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[docs]'

      - name: Build HTML
        run: make -C docs html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wiki

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
